apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinegest-site
  namespace: cinegest-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cinegest-site
  template:
    metadata:
      labels:
        app: cinegest-site
    spec:
      containers:
        - name: cinegest-site
          image: ghcr.io/etho01/cinegest-site:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
sonar.projectKey=cinegest-site-cinema
sonar.projectName=Cinegest - Site Cinema
sonar.projectVersion=1.0

# Chemins source et tests
sonar.sources=src,app
sonar.tests=__tests__
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.jsx

# Exclusions
sonar.exclusions=**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.jsx,**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/coverage/**,**/*.config.js,**/*.config.ts,**/*.config.mjs

# Rapports de couverture
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Encodage
sonar.sourceEncoding=UTF-8

# Langage
sonar.language=js

# Paramètres TypeScript/JavaScript
sonar.javascript.node.maxspace=4096

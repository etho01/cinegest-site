name: 'Code Quality'

on:
  workflow_call:

jobs:
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Check TypeScript types
        run: npx tsc --noEmit
      
      - name: Run ESLint
        run: npm run lint
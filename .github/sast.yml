name: Quality check

on:
  workflow_call:


jobs:
  quality-check:
    name: Quality check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
  
      - name: Install dependencies
        run: npm ci
    
      - name: Run lint
        run: npm run lint